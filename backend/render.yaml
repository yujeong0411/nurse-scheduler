services:
  - type: web
    name: nurse-scheduler-api
    runtime: python
    buildCommand: pip install uv && uv sync --project backend --no-dev
    startCommand: uv run --project backend uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HOSPITAL_ID
        sync: false
